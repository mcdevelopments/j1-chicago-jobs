name: Daily Chicago J1 Job Scan

on:
  schedule:
    #  1:00 PM UTC = 8:00 AM Chicago (CDT, UTC-5)
    - cron: '0 13 * * *'
  workflow_dispatch:   # lets you trigger it manually from GitHub too

permissions:
  contents: write      # needed so the action can commit results back

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scanner
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_scanner.py

      - name: Commit and push results
        run: |
          git config user.name  "j1-job-agent[bot]"
          git config user.email "j1-job-agent@users.noreply.github.com"
          git add jobs/
          if git diff --staged --quiet; then
            echo "No new jobs found — nothing to commit."
          else
            COUNT=$(python -c "import json; d=json.load(open('jobs/latest.json')); print(d['total_jobs'])")
            git commit -m "scan: $(date +'%Y-%m-%d') — ${COUNT} jobs found"
            git push
          fi
